<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Filmes Favoritos</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header__inner">
      <div class="header__logo">
        <span class="header__logo-icon">🎬</span>
        <span class="header__logo-text">Meus Filmes Favoritos</span>
      </div>

      <div class="header__search">
        <input
          type="text"
          id="searchInput"
          class="header__search-input"
          placeholder="Buscar filme, gênero ou ano..."
          autocomplete="off"
        />
        <button class="header__search-btn" onclick="filterMovies()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ===== FILTROS DE GÊNERO ===== -->
  <nav class="genre-nav" id="genreNav">
    <button class="genre-btn active" data-genre="todos" onclick="selectGenre(this)">Todos</button>
    <button class="genre-btn" data-genre="ação" onclick="selectGenre(this)">Ação</button>
    <button class="genre-btn" data-genre="drama" onclick="selectGenre(this)">Drama</button>
    <button class="genre-btn" data-genre="ficção científica" onclick="selectGenre(this)">Ficção Científica</button>
    <button class="genre-btn" data-genre="animação" onclick="selectGenre(this)">Animação</button>
    <button class="genre-btn" data-genre="terror" onclick="selectGenre(this)">Terror</button>
    <button class="genre-btn" data-genre="comédia" onclick="selectGenre(this)">Comédia</button>
    <button class="genre-btn" data-genre="aventura" onclick="selectGenre(this)">Aventura</button>
  </nav>

  <!-- ===== GRID DE FILMES ===== -->
  <main class="main">
    <div class="section-title" id="sectionTitle">Todos os Filmes</div>
    <div class="movies-grid" id="moviesGrid"></div>
    <div class="no-results" id="noResults" style="display:none;">
      <span>😕</span>
      <p>Nenhum filme encontrado.</p>
    </div>
  </main>

  <!-- ===== MODAL DE DETALHES ===== -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <button class="modal__close" onclick="closeModal()">✕</button>
      
      <!-- IFRAME PARA REPRODUÇÃO DO FILME -->
      <div class="modal__video-container" id="modalVideoContainer">
        <iframe 
          id="movieIframe"
          class="modal__iframe"
          width="100%" 
          height="400" 
          src="" 
          frameborder="0" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>
      </div>

      <div class="modal__body">
        <div class="modal__meta">
          <span class="modal__rating" id="modalRating"></span>
          <span class="modal__year" id="modalYear"></span>
          <span class="modal__duration" id="modalDuration"></span>
          <span class="modal__genre-tag" id="modalGenre"></span>
        </div>
        <h2 class="modal__title" id="modalTitle"></h2>
        <p class="modal__synopsis" id="modalSynopsis"></p>
        <div class="modal__cast">
          <strong>Elenco:</strong> <span id="modalCast"></span>
        </div>
        <div class="modal__director">
          <strong>Direção:</strong> <span id="modalDirector"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p>Feito com ❤️ · Meus Filmes Favoritos · 2025</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
